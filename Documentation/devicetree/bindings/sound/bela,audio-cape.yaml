%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/bela,audio-cape.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Bela Audio Cape Machine Driver (Bela Gem Multi)

# NOTE: This binding is for the custom machine driver (bela.c) which is
# NOT yet ported to AM62x. The Stereo board uses simple-audio-card and
# does not need this binding. The Multi board can also use
# simple-audio-card with multi-DAI-link as an alternative.
# This binding will be finalised when bela.c is ported to AM62x.

maintainers:
  - Piyush Patle <piyushpatle1228@gmail.com>
  - Giulio Moro <giuliomoro@gmail.com>

description: |
  The Bela Gem Multi is a multi-channel audio cape for PocketBeagle2
  (AM62x). It combines codecs on a shared TDM bus driven by McASP2:

    TLV320AIC3106 — stereo codec, 2 inputs + 2 outputs, BCLK/WCLK master
    ES9080Q       — 8-channel DAC, outputs only, BCLK/WCLK slave

  Total I/O: 10 outputs (2 AIC3106 + 8 ES9080Q) + 2 inputs (AIC3106).

  Clock topology:
    McASP2 outputs MCLK (12.288 MHz from 96 MHz PLL / 8) to TLV320AIC3106.
    TLV320AIC3106 PLL generates BCLK (256 clocks/frame) and WCLK (48 kHz)
    fed back to McASP2 and ES9080Q. Both McASP and ES9080Q are clock slaves.

  TDM slot allocation (16 slots x 32 bits):
    Slots  0-1  : TLV320AIC3106 (stereo in/out)
    Slots  2-9  : ES9080Q (8-channel output)
    Slots 10-15 : Unused

allOf:
  - $ref: sound-card.yaml#

properties:
  compatible:
    const: bela,audio-cape

  model:
    description: User-visible sound card name.

  cpu-dai:
    $ref: /schemas/types.yaml#/definitions/phandle
    description:
      Phandle to the McASP2 node. Operates as BCLK and WCLK consumer.

  aic3104-codec:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: |
      Phandle to the TLV320AIC3106 codec node. This codec acts as
      BCLK and WCLK master for the shared TDM bus.
      Named aic3104-codec for driver compatibility (tlv320aic3x family).

  es9080q-codec:
    $ref: /schemas/types.yaml#/definitions/phandle
    description:
      Phandle to the ES9080Q DAC node. Operates as TDM slave.

  audio-routing:
    $ref: /schemas/types.yaml#/definitions/non-unique-string-array
    description:
      DAPM route pairs connecting board connectors to codec widget names.

  clocks:
    maxItems: 1
    description:
      Master clock (MCLK) reference. On AM62x this is audio_refclk1
      (12.288 MHz = 96 MHz / 8).

  clock-names:
    items:
      - const: mclk

required:
  - compatible
  - cpu-dai
  - aic3104-codec
  - es9080q-codec
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        tlv320aic3106: codec@18 {
            compatible = "ti,tlv320aic3106";
            reg = <0x18>;
            #sound-dai-cells = <0>;
        };

        es9080q: dac@48 {
            compatible = "ess,es9080q";
            reg = <0x48>;
            #sound-dai-cells = <0>;
            ess,write-only-addr = <0x4c>;
        };
    };

    sound {
        compatible = "bela,audio-cape";
        model = "PocketBeagle2 Bela Gem Multi";

        cpu-dai = <&mcasp2>;
        aic3104-codec = <&tlv320aic3106>;
        es9080q-codec = <&es9080q>;

        clocks = <&audio_refclk1>;
        clock-names = "mclk";

        audio-routing =
            "Headphone Jack",   "HPLOUT",
            "Headphone Jack",   "HPROUT",
            "AIC3104 Line Out", "LLOUT",
            "AIC3104 Line Out", "RLOUT",
            "LINE1L",           "Line In",
            "LINE1R",           "Line In",
            "DAC Out 1",        "OUT1",
            "DAC Out 2",        "OUT2",
            "DAC Out 3",        "OUT3",
            "DAC Out 4",        "OUT4",
            "DAC Out 5",        "OUT5",
            "DAC Out 6",        "OUT6",
            "DAC Out 7",        "OUT7",
            "DAC Out 8",        "OUT8";
    };
