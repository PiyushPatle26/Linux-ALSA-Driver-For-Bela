%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/bela,audio-cape.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Bela Audio Cape Machine Driver

maintainers:
  - Jian De <jiande2020@gmail.com>
  - Giulio Moro <giuliomoro@gmail.com>
  - Piyush Patle <piyushpatle1228@gmail.com>

description: |
  The Bela Audio Cape is a multi-channel audio interface for BeagleBone
  single-board computers. It combines two audio codecs on a shared TDM bus:

    TLV320AIC3104 — stereo codec, 2 inputs + 2 outputs, BCLK/FSYNC master
    ES9080Q       — 8-channel DAC, outputs only, BCLK/FSYNC slave

  Total I/O: 10 outputs (2 from AIC3104 + 8 from ES9080Q) + 2 inputs.
  A single ALSA sound card is created covering both codecs.

  Clock topology:
    MCLK:       24.576 MHz (48 kHz family) or 22.5792 MHz (44.1 kHz family),
                supplied to both codecs via the clocks property.
    BCLK/FSYNC: Generated by TLV320AIC3104 at 256 clocks per frame and shared
                with ES9080Q and McASP, both of which operate as clock consumers.

  TDM slot allocation (16 slots × 32 bits):
    Slots  0-1  : TLV320AIC3104 (stereo in/out)
    Slots  2-9  : ES9080Q (8-channel output)
    Slots 10-15 : Unused

allOf:
  - $ref: sound-card.yaml#

properties:
  compatible:
    const: bela,audio-cape

  cpu-dai:
    $ref: /schemas/types.yaml#/definitions/phandle
    description:
      Phandle to the McASP node that provides the TDM serial bus.
      The McASP operates as a BCLK and FSYNC consumer (slave).

  aic3104-codec:
    $ref: /schemas/types.yaml#/definitions/phandle
    description:
      Phandle to the TLV320AIC3104 codec node. This codec acts as
      BCLK and FSYNC master for the shared TDM bus.

  es9080q-codec:
    $ref: /schemas/types.yaml#/definitions/phandle
    description:
      Phandle to the ES9080Q DAC node. Operates as TDM slave,
      receiving BCLK and FSYNC from the TLV320AIC3104.

  clocks:
    maxItems: 1
    items:
      - description:
          Master clock (MCLK) supplied to both codecs. Use 24.576 MHz for
          the 48 kHz sample-rate family and 22.5792 MHz for the 44.1 kHz
          family. The machine driver switches the rate automatically when
          the application selects a different sample rate.

  clock-names:
    maxItems: 1
    items:
      - const: mclk

required:
  - compatible
  - cpu-dai
  - aic3104-codec
  - es9080q-codec
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    /* Codec nodes — normally appear under their respective I2C bus node */
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        tlv320aic3104: codec@18 {
            compatible = "ti,tlv320aic3104";
            reg = <0x18>;
            #sound-dai-cells = <0>;
            clocks = <&clk_mcasp0>;
            clock-names = "mclk";
        };

        es9080q: dac@48 {
            compatible = "ess,es9080q";
            reg = <0x48>;
            #sound-dai-cells = <0>;
            ess,write-only-addr = <0x4c>;
            reset-gpios = <&gpio0 11 GPIO_ACTIVE_LOW>;
        };
    };

    sound {
        compatible = "bela,audio-cape";
        model = "Bela Audio Cape RevC";

        cpu-dai = <&mcasp0>;
        aic3104-codec = <&tlv320aic3104>;
        es9080q-codec = <&es9080q>;

        clocks = <&clk_mcasp0>;
        clock-names = "mclk";

        audio-routing =
            "Headphone Jack",   "HPLOUT",
            "Headphone Jack",   "HPROUT",
            "AIC3104 Line Out", "LLOUT",
            "AIC3104 Line Out", "RLOUT",
            "LINE1L",           "Line In",
            "LINE1R",           "Line In",
            "DAC Out 1",        "OUT1",
            "DAC Out 2",        "OUT2",
            "DAC Out 3",        "OUT3",
            "DAC Out 4",        "OUT4",
            "DAC Out 5",        "OUT5",
            "DAC Out 6",        "OUT6",
            "DAC Out 7",        "OUT7",
            "DAC Out 8",        "OUT8";
    };
