%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/ess,es9080q.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ESS Technology ES9080Q 8-Channel Audio DAC

maintainers:
  - Jian De <jiande2020@gmail.com>
  - Giulio Moro <giuliomoro@gmail.com>
  - Piyush Patle <piyushpatle1228@gmail.com>

description: |
  The ES9080Q is an 8-channel audio DAC with TDM input (up to 16 slots).
  Register control is via I2C. The chip exposes two I2C addresses:
    - Primary (0x48):  read/write registers for audio configuration
    - Secondary (0x4C): write-only registers for PLL/GPIO control

allOf:
  - $ref: /schemas/sound/audio-dai.yaml#

properties:
  compatible:
    const: ess,es9080q

  reg:
    maxItems: 1
    description: I2C address of the primary read/write interface (0x48).

  write-only-addr:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      I2C address of the write-only register interface (0x4C). The driver
      creates a dummy I2C client at this address on the same adapter for
      PLL and GPIO register access.

  reset-gpios:
    maxItems: 1
    description: |
      Optional GPIO connected to the active-low hardware reset pin (RSTN).
      Omit on boards where ES9080Q reset is tied to the board-level reset
      domain rather than a dedicated Linux-controlled GPIO.

  "#sound-dai-cells":
    const: 0

  clocks:
    maxItems: 1
    items:
      - description: Master clock (MCLK) input.

  clock-names:
    maxItems: 1
    items:
      - const: mclk

required:
  - compatible
  - reg
  - write-only-addr
  - "#sound-dai-cells"

additionalProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        es9080q: codec@48 {
            compatible = "ess,es9080q";
            reg = <0x48>;
            #sound-dai-cells = <0>;
            write-only-addr = <0x4c>;
            reset-gpios = <&gpio0 11 GPIO_ACTIVE_LOW>;
        };
    };
