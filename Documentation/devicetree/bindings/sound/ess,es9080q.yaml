%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/ess,es9080q.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ESS Technology ES9080Q 8-Channel Audio DAC

maintainers:
  - Jian De <jiande2020@gmail.com>
  - Giulio Moro <giuliomoro@gmail.com>
  - Piyush Patle <piyushpatle1228@gmail.com>

description: |
  The ES9080Q is an 8-channel audio DAC supporting TDM (Time Division
  Multiplexed) operation with up to 16 time slots. Register control is
  via I2C; audio data arrives via TDM.

  The chip exposes two I2C addresses on the same bus:
    - Primary (0x48): read/write registers for audio configuration
    - Secondary (0x4C): write-only registers for PLL reset and GPIO control

  The secondary address is specified via the write-only-addr property and
  is managed internally by the driver as a dummy I2C client.

allOf:
  - $ref: /schemas/sound/audio-dai.yaml#

properties:
  compatible:
    const: ess,es9080q

  reg:
    maxItems: 1
    description: I2C address of the primary read/write interface (0x48).

  write-only-addr:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      I2C address of the write-only register interface (0x4C).
      The ES9080Q exposes two I2C addresses on the same adapter — one for
      general read/write registers and one for write-only PLL and GPIO
      configuration registers. This property is required because the driver
      must create a separate dummy I2C client for that address.

  reset-gpios:
    maxItems: 1
    description: |
      GPIO connected to the active-low hardware reset pin (RSTN).
      The driver asserts reset for ES9080Q_RESET_ASSERT_US microseconds
      then releases it before beginning I2C initialisation.

  "#sound-dai-cells":
    const: 0

required:
  - compatible
  - reg
  - write-only-addr
  - "#sound-dai-cells"

additionalProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        es9080q: codec@48 {
            compatible = "ess,es9080q";
            reg = <0x48>;
            #sound-dai-cells = <0>;
            write-only-addr = <0x4c>;
            reset-gpios = <&gpio0 11 GPIO_ACTIVE_LOW>;
        };
    };
